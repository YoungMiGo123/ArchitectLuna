name: CI

# Deliberately NOT filtered by branch name (`branches: [...]`) — the repo's default branch name
# isn't guaranteed, and any branch filter here would silently stop this workflow from running.
on:
  push:
  pull_request:

jobs:
  build-and-unit-test:
    name: Build & fast tests (Core + Template)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ArchitectLuna.sln

      - name: Build
        run: dotnet build ArchitectLuna.sln --no-restore --configuration Release

      - name: Core unit tests
        run: dotnet test tests/ArchitectLuna.Core.Tests --no-build --configuration Release

      - name: Template snapshot tests
        run: dotnet test tests/ArchitectLuna.Template.Tests --no-build --configuration Release

  e2e-tests:
    name: End-to-end tests (scaffold + generate + build real solutions)
    runs-on: ubuntu-latest
    # Each E2E case scaffolds a real solution (live NuGet package adds) and compiles it, so this
    # tier is minutes-per-test by design — hence its own job with a generous timeout instead of
    # slowing the fast tier on every push.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ArchitectLuna.sln

      - name: Build
        run: dotnet build ArchitectLuna.sln --no-restore --configuration Release

      - name: End-to-end tests
        run: dotnet test tests/ArchitectLuna.EndToEnd.Tests --no-build --configuration Release

  e2e-smoke:
    name: CLI smoke (${{ matrix.adapter }} / ${{ matrix.persistence }} / ${{ matrix.architecture }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        adapter: [mediatr, wolverine]
        persistence: [none, in-memory, efcore-postgres, efcore-sqlserver, marten]
        architecture: [vertical-slice, clean-architecture]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build CLI
        run: dotnet build src/ArchitectLuna.Cli/ArchitectLuna.Cli.csproj --configuration Release

      - name: new api (fresh build) / add feature / add entity / generate / build
        shell: bash
        run: |
          set -euo pipefail

          cli_dll="$GITHUB_WORKSPACE/src/ArchitectLuna.Cli/bin/Release/net10.0/architect-luna.dll"
          work_dir="$RUNNER_TEMP/smoke-${{ matrix.adapter }}-${{ matrix.persistence }}-${{ matrix.architecture }}"
          mkdir -p "$work_dir"
          cd "$work_dir"

          dotnet "$cli_dll" new api SmokeApi --adapter "${{ matrix.adapter }}" --persistence "${{ matrix.persistence }}" --architecture "${{ matrix.architecture }}"
          cd SmokeApi

          # A fresh scaffold must compile before the first `generate` run.
          dotnet build SmokeApi.slnx --configuration Release

          dotnet "$cli_dll" add feature Todos
          dotnet "$cli_dll" add entity Todos TodoItem --field Title:string --field IsDone:bool --rule "Title:NotEmpty()"
          dotnet "$cli_dll" generate

          dotnet build SmokeApi.slnx --configuration Release

      # For one representative combination the generated solution's own test suite runs too —
      # its WebApplicationFactory health test boots the app for real, which catches startup-only
      # failures a successful compile can't (e.g. Wolverine's runtime-compilation requirement).
      - name: dotnet test on the generated solution (representative combination)
        if: matrix.adapter == 'wolverine' && matrix.persistence == 'in-memory' && matrix.architecture == 'clean-architecture'
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/smoke-${{ matrix.adapter }}-${{ matrix.persistence }}-${{ matrix.architecture }}/SmokeApi"
          dotnet test SmokeApi.slnx --configuration Release
